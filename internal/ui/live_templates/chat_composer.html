<form
    id="pi-chat-composer"
    class="pi-chat-composer"
    data-session-id="{{.SessionID}}"
    data-chat-available="{{.ChatAvailable}}"
    data-chat-disabled-reason="{{.ChatDisabledReason}}"
>
    <input
        id="pi-chat-images"
        name="images"
        type="file"
        accept="image/*"
        multiple
        hidden
        {{if
        not
        .ChatAvailable}}disabled{{end}}
    />
    <div class="pi-chat-shell">
        <button
            type="button"
            id="pi-chat-expand"
            class="pi-chat-expand-button"
            title="Expand composer"
            aria-label="Expand composer"
            aria-pressed="false"
            {{if
            not
            .ChatAvailable}}disabled{{end}}
        >
            <svg
                class="pi-chat-expand-icon"
                viewBox="0 0 24 24"
                aria-hidden="true"
                focusable="false"
            >
                <path
                    d="M5 5h6v2H7v4H5V5zm14 0v6h-2V7h-4V5h6zM5 13h2v4h4v2H5v-6zm14 0v6h-6v-2h4v-4h2z"
                />
            </svg>
            <svg
                class="pi-chat-collapse-icon"
                viewBox="0 0 24 24"
                aria-hidden="true"
                focusable="false"
            >
                <path
                    d="M11 5v6H5V9h4V5h2zm8 4v2h-6V5h2v4h4zM5 13h6v6H9v-4H5v-2zm14 0v2h-4v4h-2v-6h6z"
                />
            </svg>
        </button>
        {{if .Cwd}}
        <div class="pi-chat-toolbar pi-chat-cwd-bar">
            <span
                class="pi-chat-cwd"
                title="Click to copy path"
                data-cwd="{{.Cwd}}"
                >cwd: {{.Cwd}}</span
            >
            <span class="pi-chat-focus-shortcut">Shift + i to focus</span>
        </div>
        {{end}} {{if not .ChatAvailable}}
        <div class="pi-chat-disabled-notice">{{.ChatDisabledReason}}</div>
        {{end}}
        <textarea
            id="pi-chat-message"
            name="message"
            rows="1"
            placeholder="Continue this pi session…"
            {{if
            not
            .ChatAvailable}}disabled{{end}}
        ></textarea>
        <div id="pi-chat-attachments" class="pi-chat-attachments"></div>
        <div
            id="pi-chat-model-popup"
            class="pi-chat-model-popup"
            style="display: none"
        >
            <input
                type="text"
                id="pi-chat-model-search"
                class="pi-chat-model-search"
                placeholder="Search models…"
                autocomplete="off"
            />
            <div id="pi-chat-model-list" class="pi-chat-model-list"></div>
        </div>
        <div
            id="pi-chat-thinking-popup"
            class="pi-chat-thinking-popup"
            style="display: none"
        >
            <div id="pi-chat-thinking-list" class="pi-chat-thinking-list"></div>
        </div>
        <div
            id="pi-chat-skill-popup"
            class="pi-chat-skill-popup"
            style="display: none"
        >
            <div class="pi-chat-skill-header">Loaded skills</div>
            <div id="pi-chat-skill-list" class="pi-chat-skill-list"></div>
        </div>
        <div class="pi-chat-toolbar">
            <div class="pi-chat-toolbar-left">
                <button
                    type="button"
                    id="pi-chat-attach"
                    class="pi-chat-icon-button pi-chat-photo-button"
                    title="Attach photos"
                    aria-label="Attach photos"
                    {{if
                    not
                    .ChatAvailable}}disabled{{end}}
                >
                    <svg
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                        focusable="false"
                    >
                        <path
                            d="M4.75 5.5h14.5c.69 0 1.25.56 1.25 1.25v10.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25V6.75c0-.69.56-1.25 1.25-1.25Zm0 1.5v8.73l3.58-3.58a1 1 0 0 1 1.41 0l2.18 2.18 3.33-3.33a1 1 0 0 1 1.41 0L19 13.34V7H4.75Zm12.5 2.25a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z"
                        />
                    </svg>
                </button>
                <span id="pi-chat-status" class="pi-chat-status"
                    >{{if .ChatAvailable}}idle{{else}}unavailable{{end}}</span
                >
                <button
                    type="button"
                    id="pi-chat-thinking-label"
                    class="pi-chat-thinking-label"
                    style="display: none"
                    title="Switch effort"
                    {{if
                    not
                    .ChatAvailable}}disabled{{end}}
                ></button>
                <button
                    type="button"
                    id="pi-chat-model-label"
                    class="pi-chat-model-label"
                    title="Switch model"
                    {{if
                    .ModelLabel}}{{else}}style="display: none"
                    {{end}}
                    {{if
                    not
                    .ChatAvailable}}disabled{{end}}
                >
                    {{ .ModelLabel }}
                </button>
                <div
                    id="pi-chat-context-usage"
                    class="pi-chat-context-usage"
                    style="display: none"
                    title="Click for details"
                >
                    <svg class="pi-context-circle" viewBox="0 0 36 36">
                        <path
                            class="pi-context-bg"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                        />
                        <path
                            class="pi-context-fill"
                            stroke-dasharray="0, 100"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                        />
                    </svg>
                    <span class="pi-context-text">0%</span>
                </div>
            </div>
            <div class="actions">
                <button
                    type="button"
                    id="pi-chat-cancel"
                    class="pi-chat-cancel"
                    style="display: none"
                    title="Cancel running response"
                    aria-label="Cancel running response"
                    {{if
                    not
                    .ChatAvailable}}disabled{{end}}
                >
                    Cancel
                </button>
                <button
                    type="submit"
                    id="pi-chat-send"
                    class="pi-chat-send"
                    disabled
                >
                    Send
                </button>
            </div>
        </div>

        <!-- Detailed Context Usage Popover outside the toolbar for overflow safety -->
        <div id="pi-chat-context-popover" class="pi-chat-context-popover" style="display: none;">
            <div class="pi-popover-arrow"></div>
            <div class="pi-popover-header">
                <span class="pi-popover-title">Context</span>
                <span class="pi-popover-close">&times;</span>
            </div>
            <div class="pi-popover-body">
                <div class="pi-popover-hero">
                    <span class="pi-popover-used">0</span>
                    <span class="pi-popover-divider">/</span>
                    <span class="pi-popover-limit">128k</span>
                </div>
                <div class="pi-popover-progress-container">
                    <div class="pi-popover-progress-bar" style="width: 0%;"></div>
                </div>
                <div class="pi-popover-details">
                    <div class="pi-popover-row">
                        <span class="pi-row-label">Input</span>
                        <span class="pi-row-value" id="pi-popover-val-input">0</span>
                    </div>
                    <div class="pi-popover-row">
                        <span class="pi-row-label">Cache read</span>
                        <span class="pi-row-value" id="pi-popover-val-cache-read">0</span>
                    </div>
                    <div class="pi-popover-row">
                        <span class="pi-row-label">Cache write</span>
                        <span class="pi-row-value" id="pi-popover-val-cache-write">0</span>
                    </div>
                    <div class="pi-popover-row">
                        <span class="pi-row-label">Output</span>
                        <span class="pi-row-value" id="pi-popover-val-output">0</span>
                    </div>
                    <div class="pi-popover-separator"></div>
                    <div class="pi-popover-row pi-popover-total">
                        <span class="pi-row-label">Total I/O</span>
                        <span class="pi-row-value" id="pi-popover-val-total">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!--
        Always rendered: this is the composer's bottom action bar. The git
        controls inside hide themselves when the cwd is not a repo, but the btw
        button stays so it is reachable everywhere.
    -->
    <div
        class="pi-git-bar"
        id="pi-git-bar"
        data-git-repo="{{.GitIsRepo}}"
        data-git-branch="{{.GitBranch}}"
        data-git-default="{{.GitIsDefault}}"
        data-git-has-changes="{{.GitHasChanges}}"
    >
        <div class="pi-git-branch" id="pi-git-branch" {{if not .GitIsRepo}}hidden{{end}}>
            <svg class="pi-git-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M6 3a3 3 0 0 0-1 5.83V15.2A3 3 0 1 0 7 15.2V8.83A3 3 0 0 0 6 3Zm0 2a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm0 12a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm12-14a3 3 0 0 0-1 5.83V12a3 3 0 0 1-3 3h-2.17a3 3 0 1 0 0 2H14a5 5 0 0 0 5-5V8.83A3 3 0 0 0 18 3Zm0 2a1 1 0 1 1 0 2 1 1 0 0 1 0-2ZM9 17a1 1 0 1 1 0 2 1 1 0 0 1 0-2Z"/>
            </svg>
            <span class="pi-git-branch-name" id="pi-git-branch-name" title="Current branch">{{.GitBranch}}</span>
            <button
                type="button"
                class="pi-git-edit"
                id="pi-git-branch-edit"
                title="Rename branch"
                aria-label="Rename branch"
                {{if .GitIsDefault}}hidden{{end}}
            >
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M14.06 4.94l3 3L7.5 17.5 4 18.5l1-3.5 9.06-10.06zm1.42-1.42a1.5 1.5 0 0 1 2.12 0l1.88 1.88a1.5 1.5 0 0 1 0 2.12l-1 1-3-3 1-1z"/>
                </svg>
            </button>
            <input
                type="text"
                class="pi-git-branch-input"
                id="pi-git-branch-input"
                autocomplete="off"
                spellcheck="false"
                aria-label="New branch name"
                hidden
            />
        </div>
        <div class="pi-git-right">
        <button type="button" class="pi-git-pr-button pi-btw-button" id="pi-btw-button" title="btw">
            btw
        </button>
        <!--
            Initial state is rendered server-side from the fast git facts (no PR
            detection yet) so the control doesn't flash a wrong label before the
            JS runs. The async /api/git/info fetch then refines for PR state.
        -->
        <div class="pi-git-pr" id="pi-git-pr" {{if or (not .GitIsRepo) (and .GitIsDefault (not .GitHasChanges))}}hidden{{end}}>
            <button type="button" class="pi-git-pr-button pi-git-primary" id="pi-git-primary" {{if and .GitIsDefault (not .GitHasChanges)}}hidden{{end}}>
                <span id="pi-git-primary-label">{{if .GitIsDefault}}Commit &amp; push{{else}}Create PR{{end}}</span>
            </button>
            <button
                type="button"
                class="pi-git-pr-button pi-git-caret"
                id="pi-git-caret"
                aria-haspopup="true"
                aria-expanded="false"
                aria-label="More git actions"
                {{if .GitIsDefault}}hidden{{end}}
            >
                <span aria-hidden="true">▾</span>
            </button>
            <div class="pi-git-pr-menu" id="pi-git-pr-menu" role="menu" hidden>
                <button type="button" class="pi-git-pr-item" id="pi-git-pr-view" role="menuitem" hidden>
                    View PR ↗
                </button>
                <button type="button" class="pi-git-pr-item" id="pi-git-pr-draft" role="menuitem" hidden>
                    Create Draft PR
                </button>
                <button type="button" class="pi-git-pr-item" id="pi-git-pr-manual" role="menuitem" {{if .GitIsDefault}}hidden{{end}}>
                    Create PR manually ↗
                </button>
                <button type="button" class="pi-git-pr-item" id="pi-git-pr-merge" role="menuitem" hidden>
                    Merge PR
                </button>
                <button type="button" class="pi-git-pr-item" id="pi-git-pr-commit" role="menuitem" hidden>
                    Commit &amp; push
                </button>
            </div>
        </div>
        </div>
    </div>
</form>
