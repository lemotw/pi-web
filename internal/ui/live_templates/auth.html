<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1"
        />
        <title>pi-web — Authentication Required</title>
        <link rel="icon" type="image/svg+xml" href="/icon.svg" />
        <script>
            (function () {
                var theme = "dark";
                try {
                    theme = localStorage.getItem("pi-web-theme") || "dark";
                } catch (e) {}
                document.documentElement.dataset.theme = theme;
            })();
        </script>
        <style>
            :root,
            [data-theme="dark"] {
                --body-bg: #111116;
                --text: #e6e7eb;
                --text-soft: #b7bbc4;
                --muted: #858a96;
                --dim: #292a33;
                --surface-2: #191920;
                --accent: #9cc7c0;
                --danger: #ef767a;
            }
            [data-theme="light"] {
                --body-bg: #f6f5f2;
                --text: #1f2328;
                --text-soft: #3f4650;
                --muted: #747b85;
                --dim: #d8d5cc;
                --surface-2: #f1f0ec;
                --accent: #496f69;
                --danger: #b23b42;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
            }
            body {
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Consolas,
                    "Liberation Mono", monospace;
                font-size: 13px;
                line-height: 1.5;
                color: var(--text-soft);
                background: var(--body-bg);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            .container {
                width: 100%;
                max-width: 380px;
                background: var(--surface-2);
                border: 1px solid var(--dim);
                border-radius: 8px;
                padding: 32px;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
            }
            .brand-header {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 8px;
            }
            .pi-logo-mark {
                width: 20px;
                height: 20px;
                display: inline-block;
                background: var(--accent);
                -webkit-mask: url("/icon.svg") center / contain no-repeat;
                mask: url("/icon.svg") center / contain no-repeat;
            }
            h1 {
                color: var(--text);
                font-size: 16px;
                font-weight: 650;
                letter-spacing: -0.015em;
            }
            .subtitle {
                color: var(--muted);
                font-size: 12px;
                margin-bottom: 8px;
            }
            .hint {
                color: var(--muted);
                font-size: 11px;
                margin-bottom: 24px;
                line-height: 1.6;
            }
            .hint code {
                background: var(--body-bg);
                color: var(--text-soft);
                padding: 2px 6px;
                border: 1px solid var(--dim);
                border-radius: 4px;
                font-family: inherit;
                font-size: 11px;
                white-space: nowrap;
            }
            .field {
                margin-bottom: 6px;
            }
            label {
                display: block;
                color: var(--text-soft);
                font-size: 12px;
                font-weight: 550;
                margin-bottom: 6px;
            }
            input {
                width: 100%;
                height: 38px;
                background: var(--body-bg);
                border: 1px solid var(--dim);
                border-radius: 6px;
                color: var(--text);
                padding: 0 12px;
                font-family: inherit;
                font-size: 13px;
                outline: none;
                transition:
                    border-color 0.12s,
                    box-shadow 0.12s;
            }
            input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 2px
                    color-mix(in srgb, var(--accent) 20%, transparent);
            }
            input::placeholder {
                color: var(--muted);
            }
            .error {
                visibility: hidden;
                color: var(--danger);
                font-size: 11px;
                line-height: 16px;
                min-height: 16px;
                margin-bottom: 8px;
            }
            button {
                width: 100%;
                height: 38px;
                background: var(--accent);
                color: var(--body-bg);
                border: 0;
                border-radius: 6px;
                font-family: inherit;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                transition:
                    opacity 0.12s,
                    filter 0.12s;
            }
            button:hover {
                opacity: 0.9;
                filter: brightness(1.05);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="brand-header">
                <span class="pi-logo-mark" aria-hidden="true"></span>
                <h1>Pi Sessions</h1>
            </div>
            <p class="subtitle">Authentication Required</p>
            <p class="hint">
                Run <code>/pi-web token</code> in <code>pi</code> to retrieve
                it.
            </p>
            <form method="post">
                <div class="field">
                    <label for="token">Access Token</label>
                    <input
                        type="password"
                        id="token"
                        name="token"
                        placeholder="Enter access token"
                        required
                        autofocus
                        autocomplete="off"
                    />
                </div>
                <div class="error" id="error">Invalid access token.</div>
                <button type="submit">Continue</button>
            </form>
        </div>
        <script>
            if (location.search.indexOf("error=1") !== -1) {
                document.getElementById("error").style.visibility = "visible";
            }
        </script>
    </body>
</html>
