<div class="command-palette-overlay" id="{{.ID}}" aria-hidden="true">
  <div class="command-palette" role="dialog" aria-modal="true" aria-label="{{.Label}}">
    <input type="text" id="{{.SearchID}}" placeholder="Search sessions..." autocomplete="off">
    <div class="palette-results" data-palette-results></div>
    {{if .Actions}}
    <div class="palette-section-title">Actions</div>
    <button class="palette-action" type="button" data-new-session-btn>New session</button>
    <button class="palette-action muted" type="button">Import session</button>
    {{end}}
  </div>
</div>
