<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  {{SESSION_PRELOAD}}
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0e0e13">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pi Sessions">
  <style>
{{CSS}}
  </style>
</head>
<body{{BODY_ATTRS}}>
  <script>try{const c=localStorage.getItem('pi-share:v1:sidebar-collapsed');if(c==='true')document.body.classList.add('sidebar-collapsed');}catch(e){}</script>
  <script>
  (function(){
    var STORAGE_KEY = 'pi-web-theme';
    function applyTheme(t){ document.documentElement.dataset.theme = t || 'dark'; }
    try{ applyTheme(localStorage.getItem(STORAGE_KEY)); }catch(e){ applyTheme('dark'); }
    function updateBtn(){
      var btn = document.getElementById('theme-toggle');
      if(!btn) return;
      var isDark = (document.documentElement.dataset.theme || 'dark') === 'dark';
      var span = btn.querySelector('span');
      if(span) span.textContent = isDark ? '☀' : '◐';
      var meta = document.querySelector('meta[name="theme-color"]');
      if(meta) meta.content = isDark ? '#0e0e13' : '#f8f8f8';
    }
    function toggleTheme(){
      var current = document.documentElement.dataset.theme || 'dark';
      var next = current === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      try{ localStorage.setItem(STORAGE_KEY, next); }catch(e){}
      updateBtn();
    }
    if(document.readyState === 'loading'){
      document.addEventListener('DOMContentLoaded', function(){
        updateBtn();
        var btn = document.getElementById('theme-toggle');
        if(btn) btn.addEventListener('click', toggleTheme);
      });
    } else {
      updateBtn();
      var btn = document.getElementById('theme-toggle');
      if(btn) btn.addEventListener('click', toggleTheme);
    }
  })();
  </script>
  <script>if('serviceWorker' in navigator && window.isSecureContext){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(function(){});});}</script>
  <div class="session-actions">
    <a href="/" class="session-action" title="Back to sessions"><span>←</span>Sessions</a>
    <button id="theme-toggle" class="session-action" title="Toggle light/dark theme"><span>◐</span>Theme</button>
    <button id="notify-toggle" class="session-action" title="Notify when response is ready" aria-pressed="false"><span>◌</span>Notify</button>
    <button id="resume-btn" class="session-action" title="Copy pi --session command to clipboard"><span>$_</span>Terminal</button>
    <button id="new-btn" class="session-action" title="New Session"><span>+</span>Session</button>
    <button id="share-btn" class="session-action" title="Share session as GitHub Gist"><span>↗</span>Share</button>
  </div>

  <div class="mobile-header">
    <a href="/" class="mobile-header-back"><span>←</span> Sessions</a>
    <button id="mobile-command-btn" class="mobile-header-actions" aria-label="Session actions">⋯</button>
  </div>

  <div id="mobile-command-backdrop" class="mobile-command-backdrop" style="display: none;"></div>
  <div id="mobile-command-panel" class="mobile-command-panel" style="display: none;">
    <div class="mobile-command-handle"></div>
    <div class="mobile-command-title">Session Actions</div>
    <div class="mobile-command-body">
      <div class="mobile-command-section">
        <div class="mobile-command-section-title">Appearance</div>
        <button class="mobile-command-item" data-action="theme"><span class="mobile-command-icon">◐</span><span>Theme</span></button>
      </div>
      <div class="mobile-command-section">
        <div class="mobile-command-section-title">Session</div>
        <button class="mobile-command-item" data-action="rename"><span class="mobile-command-icon">✎</span><span>Rename</span></button>
        <button class="mobile-command-item" data-action="share"><span class="mobile-command-icon">↗</span><span>Share</span></button>
        <button class="mobile-command-item" data-action="new-session"><span class="mobile-command-icon">+</span><span>New Session</span></button>
        <button class="mobile-command-item" data-action="fork"><span class="mobile-command-icon">⑂</span><span>Fork</span></button>
        <button class="mobile-command-item" data-action="clone"><span class="mobile-command-icon">⎘</span><span>Clone</span></button>
      </div>
      <div class="mobile-command-section">
        <div class="mobile-command-section-title">Development</div>
        <button class="mobile-command-item" data-action="terminal"><span class="mobile-command-icon">$_</span><span>Copy to Terminal</span></button>
        <button class="mobile-command-item" data-action="tree"><span class="mobile-command-icon">▤</span><span>Tree</span></button>
        <button class="mobile-command-item" data-action="diff"><span class="mobile-command-icon">±</span><span>Diff</span></button>
      </div>
      <div class="mobile-command-section">
        <div class="mobile-command-section-title">Insights</div>
        <button class="mobile-command-item" data-action="model-usage"><span class="mobile-command-icon">◈</span><span>Model Usage</span></button>
      </div>
      <div class="mobile-command-section">
        <div class="mobile-command-section-title">Preferences</div>
        <button class="mobile-command-item mobile-command-item-toggle" data-action="notifications">
          <span class="mobile-command-icon">◌</span><span>Notifications</span>
          <span class="mobile-command-toggle" id="mobile-command-notify-status">OFF</span>
        </button>
      </div>
    </div>
  </div>

  <button id="hamburger" title="Open sidebar"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="12" r="2.5"/><rect x="5" y="6" width="2" height="12"/><path d="M6 12h10c1 0 2 0 2-2V8"/></svg></button>
  <div id="sidebar-overlay"></div>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-controls">
          <input type="text" class="sidebar-search" id="tree-search" placeholder="Search...">
          <button id="hide-sidebar" class="hide-sidebar" title="Hide sidebar">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <circle cx="18" cy="6" r="2.5"></circle>
                <circle cx="18" cy="18" r="2.5"></circle>
                <circle cx="6" cy="12" r="2.5"></circle>

                <rect x="17" y="6" width="2" height="12"></rect>

                <path d="M18 12H8c-1 0-2 0-2-2V8"></path>
              </svg></button>
        </div>
        <div class="sidebar-filters">
          <button class="filter-btn active" data-filter="default" title="Hide settings entries">Default</button>
          <button class="filter-btn" data-filter="no-tools" title="Default minus tool results">No-tools</button>
          <button class="filter-btn" data-filter="user-only" title="Only user messages">User</button>
          <button class="filter-btn" data-filter="labeled-only" title="Only labeled entries">Labeled</button>
          <button class="filter-btn" data-filter="all" title="Show everything">All</button>
        </div>
      </div>
      <div class="tree-container" id="tree-container"></div>
      <div class="tree-status" id="tree-status"></div>
    </aside>
    <div id="sidebar-resizer" role="separator" aria-orientation="vertical" aria-label="Resize session tree sidebar"></div>
    <main id="content">
      <div id="header-container"></div>
      <div id="messages">{{FIRST_MESSAGE_STUB}}</div>
    </main>
    <div id="image-modal" class="image-modal">
      <img id="modal-image" src="" alt="">
    </div>
  </div>

  <div id="share-overlay" class="share-overlay-backdrop" style="display: none;">
    <div id="share-dialog" class="share-dialog">
      <h3 id="share-title"></h3>
      <div id="share-fields">
        <div class="share-field"><label>Gist URL</label><input id="share-gist-url" readonly class="share-url-input" onclick="this.select()"></div>
        <div class="share-field"><label>Preview URL</label><input id="share-preview-url" readonly class="share-url-input" onclick="this.select()"></div>
      </div>
      <p id="share-error-message" class="share-error-message" style="display: none;"></p>
      <div class="share-actions">
        <button id="share-copy-gist" class="share-btn-primary" data-copy-label="Gist">Copy Gist</button>
        <button id="share-copy-preview" class="share-btn-secondary" data-copy-label="Preview">Copy Preview</button>
        <button id="share-close" class="share-btn-secondary">Close</button>
      </div>
    </div>
  </div>
  <div id="share-copy-notice" class="toast-notice"></div>

  <script id="session-data" type="application/json">{{SESSION_DATA}}</script>

{{SESSION_SCRIPT}}
{{CHAT_COMPOSER}}
</body>
</html>
