<div id="{{.ID}}" class="{{.Class}}" {{.ContainerAttrs}}>
  {{- if .BodyClass }}<div class="{{.BodyClass}}">{{ end }}
  {{- range .Sections }}
    <div class="{{$.SectionClass}}">
      {{- if .Title }}<div class="{{$.SectionTitleClass}}">{{.Title}}</div>{{ end }}
      {{- range .Items }}
        {{- if .Href }}
          <a class="{{$.ItemClass}}{{if .Muted}} muted{{end}}" href="{{.Href}}" {{.Attrs}}>{{.Label}}{{.Suffix}}</a>
        {{- else }}
          <button class="{{$.ItemClass}}{{if .Muted}} muted{{end}}{{if .ExtraClass}} {{.ExtraClass}}{{end}}" type="button" {{.Attrs}}>{{.Label}}{{.Suffix}}</button>
        {{- end }}
      {{- end }}
    </div>
  {{- end }}
  {{- if .BodyClass }}</div>{{ end }}
</div>
